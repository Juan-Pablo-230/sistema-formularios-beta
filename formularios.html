<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Inscripción</title>
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="shortcut icon" href="/img/logo.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <h1>Formulario de inscripción</h1>
        <h2 id="claseTitulo">Cargando información de la clase...</h2>
        
        <!-- Indicador de clase seleccionada -->
        <div class="clase-indicador" id="claseIndicador" style="display: none;">
            <strong>📋 Clase seleccionada:</strong>
            <span id="claseNombre"></span>
            <div class="clase-detalles" id="claseDetalles"></div>
        </div>

        <p class="deadline" id="deadline"></p>

        <div class="back-btn-container">
            <a href="../index.html" class="back-btn">← Volver al Menú Principal</a>
        </div>
        
        <form id="inscripcionForm">
            <!-- Campos ocultos con información de la clase -->
            <input type="hidden" name="claseId" id="claseId" value="">
            <input type="hidden" name="clase" id="claseHidden" value="">
            <input type="hidden" name="enlaceRedireccion" id="enlaceRedireccion" value="">
            
            <!-- Campos del formulario (ocultos visualmente pero funcionales) -->
            <div class="form-group">
                <label for="apellidoNombre">Apellido y Nombre *</label>
                <input type="text" id="apellidoNombre" name="apellidoNombre" required readonly>
            </div>

            <div class="form-group">
                <label for="legajo">Número de Legajo</label>
                <input type="number" id="legajo" name="legajo" required readonly>
            </div>

            <div class="form-group">
                <label for="clase">Clase:</label>
                <select id="clase" name="clase" readonly required>
                    <option id="claseOption" value="">Seleccione una clase</option>
                </select>
            </div>

            <div class="form-group">
                <label for="turno">Turno</label>
                <select id="turno" name="turno" required readonly>
                    <option value="">Seleccione turno</option>
                    <option value="Turno mañana">Turno mañana</option>
                    <option value="Turno tarde">Turno tarde</option>
                    <option value="Turno noche A">Turno noche A</option>
                    <option value="Turno noche B">Turno noche B</option>
                    <option value="Turno intermedio">Turno intermedio</option>
                    <option value="Turno SADOFE">Turno Sábado, Domingo y feriado</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required readonly>
            </div>

            <!-- Solo el botón es visible -->
            <button type="submit" class="submit-btn" id="submitBtn">Ingresar a la clase</button>
        </form>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/formularios.js"></script>

    <script>
    // Prevenir que formularios.js agregue su propio manejador
    window.DESACTIVAR_MANEJADOR_FORMULARIO = true;
    
    // Obtener claseId de la URL - CORREGIDO
    const urlParams = new URLSearchParams(window.location.search);
    const claseId = urlParams.get('claseId'); // Ahora busca 'claseId'
    
    console.log('🔍 URL completa:', window.location.href);
    console.log('🔍 claseId obtenido:', claseId);
    
    if (!claseId) {
        alert('Error: No se especificó la clase');
        window.location.href = '/index.html';
    }
    
    // Guardar claseId globalmente
    window.CLASE_ID = claseId;
    
    // Función para cargar datos de la clase
    async function cargarDatosClase() {
        try {
            console.log('📥 Cargando datos de la clase ID:', claseId);
            
            document.getElementById('claseTitulo').textContent = 'Cargando información de la clase...';
            
            const url = `/api/clases-publicas/${claseId}`;
            console.log('📡 Fetching URL:', url);
            
            const response = await fetch(url);
            console.log('📡 Response status:', response.status);
            
            if (!response.ok) {
                throw new Error(`Error HTTP: ${response.status}`);
            }
            
            const result = await response.json();
            console.log('📦 Datos recibidos:', result);
            
            if (!result.success || !result.data) {
                throw new Error(result.message || 'Error al cargar la clase');
            }
            
            const clase = result.data;
            console.log('✅ Clase cargada:', clase);
            
            // Actualizar título
            document.getElementById('claseTitulo').textContent = `Clase "${clase.nombre}"`;
            
            // Actualizar indicador visible
            document.getElementById('claseIndicador').style.display = 'block';
            document.getElementById('claseNombre').textContent = clase.nombre;
            
            // Agregar detalles al indicador
            const detallesDiv = document.getElementById('claseDetalles');
            let detallesHTML = '';
            
            if (clase.instructores && clase.instructores.length > 0) {
                detallesHTML += `<span><i>👥</i> ${clase.instructores.join(', ')}</span>`;
            }
            
            if (clase.lugar) {
                detallesHTML += `<span><i>📍</i> ${clase.lugar}</span>`;
            }
            
            if (clase.fechaClase) {
                const fecha = new Date(clase.fechaClase);
                const fechaFormateada = fecha.toLocaleDateString('es-AR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
                detallesHTML += `<span><i>📅</i> ${fechaFormateada}hs</span>`;
            }
            
            detallesDiv.innerHTML = detallesHTML;
            
            // Actualizar campos ocultos
            document.getElementById('claseId').value = claseId;
            document.getElementById('claseHidden').value = clase.nombre;
            
            // Guardar enlace de redirección
            if (clase.enlaceFormulario) {
                document.getElementById('enlaceRedireccion').value = clase.enlaceFormulario;
                console.log('🔗 Enlace de redirección:', clase.enlaceFormulario);
            } else {
                document.getElementById('enlaceRedireccion').value = '/asistenciapres.html';
                console.log('🔗 Usando enlace por defecto');
            }
            
            // Actualizar selector de clase
            const claseOption = document.getElementById('claseOption');
            claseOption.value = clase.nombre;
            claseOption.textContent = clase.nombre;
            
            // Autocompletar datos del usuario
            autocompletarDatosUsuario();
            
        } catch (error) {
            console.error('❌ Error cargando clase:', error);
            document.getElementById('claseTitulo').textContent = 'Error al cargar la clase';
            
            // Mostrar error más descriptivo
            const indicador = document.getElementById('claseIndicador');
            if (indicador) {
                indicador.style.display = 'block';
                indicador.innerHTML = `
                    <strong style="color: #dc3545;">❌ Error</strong>
                    <div style="margin-top: 10px; color: var(--text-secondary);">
                        ${error.message}<br>
                        <small>URL intentada: /api/clases-publicas/${claseId}</small>
                    </div>
                `;
            }
        }
    }
    
    // Función para autocompletar datos del usuario
    function autocompletarDatosUsuario() {
        if (authSystem && authSystem.isLoggedIn && authSystem.isLoggedIn()) {
            const user = authSystem.getCurrentUser();
            console.log('👤 Usuario logueado:', user);
            
            if (user.apellidoNombre) {
                document.getElementById('apellidoNombre').value = user.apellidoNombre;
            }
            if (user.legajo) {
                document.getElementById('legajo').value = user.legajo;
            }
            if (user.turno) {
                document.getElementById('turno').value = user.turno;
            }
            if (user.email) {
                document.getElementById('email').value = user.email;
            }
        }
    }
    
    // Función para manejar el envío del formulario
    async function manejarEnvioFormulario(event) {
        event.preventDefault();
        console.log('📤 Enviando formulario...');
        
        const submitBtn = document.getElementById('submitBtn');
        const textoOriginal = submitBtn.textContent;
        
        try {
            if (!authSystem.isLoggedIn()) {
                alert('Debe iniciar sesión');
                window.location.href = '/index.html';
                return;
            }
            
            const usuario = authSystem.getCurrentUser();
            const claseActual = document.getElementById('claseHidden').value;
            const turno = document.getElementById('turno').value;
            
            console.log('📦 Datos del formulario:', {
                usuarioId: usuario._id,
                clase: claseActual,
                turno: turno
            });
            
            if (!claseActual || !turno) {
                alert('Error: Faltan datos de la clase');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Procesando...';
            
            const inscripcionData = {
                usuarioId: usuario._id,
                clase: claseActual,
                turno: turno,
                fecha: new Date().toISOString()
            };
            
            console.log('📡 Enviando a /api/inscripciones:', inscripcionData);
            
            const response = await fetch('/api/inscripciones', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'user-id': usuario._id
                },
                body: JSON.stringify(inscripcionData)
            });
            
            console.log('📡 Response status:', response.status);
            
            const result = await response.json();
            console.log('📦 Respuesta:', result);
            
            if (result.success) {
                console.log('✅ Inscripción exitosa');
                const enlaceRedireccion = document.getElementById('enlaceRedireccion').value;
                console.log('🔗 Redirigiendo a:', enlaceRedireccion);
                window.location.href = enlaceRedireccion;
            } else {
                throw new Error(result.message || 'Error al guardar la inscripción');
            }
            
        } catch (error) {
            console.error('❌ Error en el envío:', error);
            alert('Error: ' + error.message);
            submitBtn.disabled = false;
            submitBtn.textContent = textoOriginal;
        }
    }
    
    // Hacer campos readonly
    function hacerCamposReadonly() {
        const campos = ['apellidoNombre', 'legajo', 'email'];
        campos.forEach(id => {
            const campo = document.getElementById(id);
            if (campo) campo.setAttribute('readonly', true);
        });
        
        const selects = ['clase', 'turno'];
        selects.forEach(id => {
            const select = document.getElementById(id);
            if (select) select.setAttribute('readonly', true);
        });
    }
    
    // Inicializar
    document.addEventListener('DOMContentLoaded', function() {
        console.log('📄 Inicializando formulario...');
        hacerCamposReadonly();
        cargarDatosClase();
        
        const form = document.getElementById('inscripcionForm');
        form.addEventListener('submit', manejarEnvioFormulario);
    });
    
    window.obtenerClaseActual = function() {
        return document.getElementById('claseHidden').value;
    };
</script>

</body>
</html>
