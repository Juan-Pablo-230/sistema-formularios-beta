<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clases - Panel Admin</title>
    <link rel="stylesheet" href="/css/admin/admin.css">
    <link rel="stylesheet" href="/css/admin/gestion-clases.css">
</head>
<body>
    <div class="section-container">
        <!-- Estadísticas -->
        <div class="stats-grid">
            <div class="stat-mini-card">
                <div class="stat-label">Total Clases</div>
                <div class="stat-value" id="totalClases">0</div>
            </div>
            <div class="stat-mini-card">
                <div class="stat-label">Publicadas</div>
                <div class="stat-value" id="clasesPublicadas">0</div>
            </div>
            <div class="stat-mini-card">
                <div class="stat-label">Activas</div>
                <div class="stat-value" id="clasesActivas">0</div>
            </div>
            <div class="stat-mini-card">
                <div class="stat-label">Canceladas</div>
                <div class="stat-value" id="clasesCanceladas">0</div>
            </div>
        </div>

        <!-- Panel de creación/edición -->
        <div class="form-panel">
            <div class="form-header">
                <h3 id="formTitle">➕ Agregar Nueva Clase</h3>
                <button id="cancelEditBtn" class="btn btn-secondary btn-small" style="display: none;">❌ Cancelar edición</button>
            </div>
            
            <form id="claseForm" class="clase-form">
                <div id="formMessage" class="message" style="display: none;"></div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre de la Clase <span class="required">*</span></label>
                        <input type="text" id="claseNombre" required class="form-control" placeholder="Ej: Stroke / IAM Avanzado">
                    </div>
                    
                    <div class="form-group">
                        <label>Instructores</label>
                        <input type="text" id="claseInstructores" placeholder="Dr. Juan Pérez, Lic. María González" class="form-control">
                        <small class="field-info">Separar por comas si hay múltiples instructores</small>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha <span class="required">*</span></label>
                        <input type="date" id="claseFecha" required class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label>Hora</label>
                        <input type="time" id="claseHora" value="10:00" class="form-control" step="60">
                        <small class="field-info">Formato 24 horas (ej: 14:30 para 2:30 PM)</small>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="claseDescripcion" rows="2" class="form-control" placeholder="Breve descripción de la clase..."></textarea>
                </div>
                
                <!-- Selector de Estado de la Clase -->
                <div class="form-group">
                    <label>Estado de la Clase <span class="required">*</span></label>
                    <div class="estado-opciones">
                        <div class="estado-opcion">
                            <input type="radio" id="estadoPublicada" name="claseEstado" value="publicada">
                            <label for="estadoPublicada" class="estado-boton publicada">
                                <span class="estado-icono">📢</span>
                                <span class="estado-texto">Publicada</span>
                                <small class="estado-desc">Visible para usuarios con enlaces</small>
                            </label>
                        </div>
                        <div class="estado-opcion">
                            <input type="radio" id="estadoActiva" name="claseEstado" value="activa">
                            <label for="estadoActiva" class="estado-boton activa">
                                <span class="estado-icono">✅</span>
                                <span class="estado-texto">Activa</span>
                                <small class="estado-desc">Solo visible en panel admin</small>
                            </label>
                        </div>
                        <div class="estado-opcion">
                            <input type="radio" id="estadoCancelada" name="claseEstado" value="cancelada">
                            <label for="estadoCancelada" class="estado-boton cancelada">
                                <span class="estado-icono">❌</span>
                                <span class="estado-texto">Cancelada</span>
                                <small class="estado-desc">Solo visible en panel admin</small>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- Sección de Enlaces -->
                <div class="enlaces-section">
                    <h4>🔗 Enlaces del Material</h4>
                    <p class="field-info">Los enlaces son opcionales</p>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>YouTube</label>
                            <input type="url" id="claseYoutube" class="form-control" placeholder="https://youtube.com/...">
                        </div>
                        
                        <div class="form-group">
                            <label>Presentación (PPT/PDF)</label>
                            <input type="url" id="clasePowerpoint" class="form-control" placeholder="https://docs.google.com/...">
                        </div>
                    </div>
                </div>
                
                <!-- Tags (opcional) -->
                <div class="form-group">
                    <label>Tags (opcional)</label>
                    <input type="text" id="claseTags" placeholder="stroke, iam, emergencia" class="form-control">
                    <small class="field-info">Separar por comas para categorizar la clase</small>
                </div>
                
                <div class="form-actions">
                    <div class="action-buttons">
                        <button type="submit" class="btn btn-success" id="submitClaseBtn">💾 Guardar Clase</button>
                        <button type="button" id="limpiarFormBtn" class="btn btn-secondary">🗑️ Limpiar</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Lista de clases -->
        <div class="table-container">
            <div class="list-header">
                <h2>📋 Clases Existentes</h2>
                <div class="list-actions">
                    <select id="filtroEstado" class="filtro-select">
                        <option value="todos">Todos los estados</option>
                        <option value="publicadas">📢 Publicadas</option>
                        <option value="activas">✅ Activas</option>
                        <option value="canceladas">❌ Canceladas</option>
                    </select>
                    <input type="text" id="buscarClase" placeholder="🔍 Buscar clase..." class="search-input">
                    <button id="refrescarClasesBtn" class="btn btn-primary">🔄 Refrescar</button>
                </div>
            </div>
            
            <div id="clasesList" class="clases-list">
                <!-- Las clases se cargan aquí -->
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/admin/admin-core.js"></script>
    <script src="/js/admin/gestion-clases.js"></script>
</body>
</html>
